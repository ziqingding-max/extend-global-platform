# =============================================================================
# Extend Global (EG) — Nginx 站点配置（通配符子域名版）
# =============================================================================
# 初始版本：仅 HTTP（用于首次部署和 SSL 证书申请）
# SSL 证书申请成功后，运行 enable-ssl.sh 脚本自动切换为 HTTPS
# =============================================================================
# 子域名路由：
#   admin.extendglobal.ai   → 管理后台（Admin Dashboard）
#   app.extendglobal.ai     → 客户门户（Client Portal）
#   worker.extendglobal.ai  → 员工门户（Worker Portal）
#   *.extendglobal.ai       → CP 白标门户（Channel Partner White-Label）
#     例: acme.extendglobal.ai → ACME CP 的客户/员工门户
# =============================================================================

# 上游应用服务器
upstream eg_app {
    server app:3000;
    keepalive 32;
}

# ─── HTTP 服务器（管理后台）──────────────────────────────────────────────
server {
    listen 80;
    server_name admin.extendglobal.ai;

    # Let's Encrypt 验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    client_max_body_size 50m;

    # API 请求代理到 Node.js
    location /api/ {
        proxy_pass http://eg_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 所有其他请求代理到 Node.js
    location / {
        proxy_pass http://eg_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://eg_app;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

