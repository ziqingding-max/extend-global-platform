# ─── HTTP 服务器（CP 白标通配符子域名）──────────────────────────────────
# 设计说明：
#   *.extendglobal.ai 匹配所有未被上面 server 块捕获的子域名。
#   前端 SPA 通过 isCpDomain() 检测到 CP 子域名后，
#   调用 /api/branding/{subdomain} 获取 CP 品牌信息，
#   然后根据 URL 路径渲染 Portal 或 Worker 页面。
#   例: acme.extendglobal.ai/portal → ACME CP 的客户门户
#       acme.extendglobal.ai/worker → ACME CP 的员工门户
server {
    listen 80;
    server_name *.extendglobal.ai;

    # Let's Encrypt 验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    client_max_body_size 50m;

    # API 请求代理到 Node.js
    location /api/ {
        proxy_pass http://eg_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 所有请求代理到 Node.js（SPA fallback）
    location / {
        proxy_pass http://eg_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://eg_app;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ─── 默认服务器（IP 直接访问或未知域名）──────────────────────────────────
server {
    listen 80 default_server;
    server_name _;

    # Let's Encrypt 验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 重定向到管理后台
    location / {
        return 301 http://admin.extendglobal.ai$request_uri;
    }
}
